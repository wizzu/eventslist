<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Events</title>
  <link rel="icon" type="image/svg+xml" href="static/favicon.svg">
  <link rel="icon" type="image/x-icon" href="static/favicon.ico">
  <link rel="stylesheet" href="static/style.css">
  <script src="static/app.js" defer></script>
  <script src="static/vendor/alpine-3.15.8.min.js" defer></script>
</head>
<body x-data="app">
  <header>
    <h1>Events</h1>
    <span class="header-counts" x-text="counts"></span>
  </header>
  <main>
    <div class="left-col">
      <p x-show="!events.length" x-text="status"></p>
      <div class="search-wrap">
        <input class="search-box" type="search" placeholder="Search events…" x-model="rawQuery" :class="searching && 'search-pending'" x-ref="search">
        <button class="search-clear" x-show="rawQuery" @click="rawQuery = ''; query = ''; searching = false; clearTimeout(_debounceTimer); $refs.search.focus()" aria-label="Clear search">✕</button>
      </div>
      <div class="listing-toolbar">
        <span class="event-count" x-text="fmtCounts(filteredEvents) + ' events'"></span>
        <button class="sort-toggle" @click="sortAsc = !sortAsc" :title="sortAsc ? 'Sort: oldest first' : 'Sort: newest first'">
          <span x-text="sortAsc ? '↑ Oldest first' : '↓ Newest first'"></span>
        </button>
      </div>
      <div class="event-list">
        <template x-for="(event, index) in filteredEvents" :key="index">
          <div class="event-row">
            <span class="event-date" x-text="event.date"></span>
            <span class="event-title" x-text="eventTitle(event)"></span>
            <span class="event-location">
              <span x-text="event.location"></span><span class="event-comment" x-show="event.comment" x-text="event.comment ? ' · ' + event.comment : ''"></span>
            </span>
            <span class="event-type" x-show="event.type" x-text="event.type ? '[' + event.type + ']' : ''"></span>
          </div>
        </template>
      </div>
    </div>
    <div class="right-col">
      <dl class="stats-summary">
        <div class="stats-summary-row">
          <dt>Events</dt>
          <dd x-text="fmtCounts(filteredEvents)"></dd>
        </div>
        <div class="stats-summary-row">
          <dt>Performances</dt>
          <dd x-text="performanceCountsStr"></dd>
        </div>
        <div class="stats-summary-row">
          <dt>Performers</dt>
          <dd x-text="performerStats.length"></dd>
        </div>
        <div class="stats-summary-row">
          <dt>Years</dt>
          <dd x-text="yearStats.length"></dd>
        </div>
      </dl>
      <h2 class="stats-heading">Events by year</h2>
      <div class="stats-table-scroll">
      <table class="stats-table">
        <thead>
          <tr class="sort-row">
            <th><button class="sort-btn" :class="yearSort.col === 'year' && 'sort-active'" @click="setSort('yearSort', 'year')">Year<span x-show="yearSort.col === 'year'" x-text="yearSort.dir === 'asc' ? ' ↑' : ' ↓'"></span></button></th>
            <th colspan="2"><button class="sort-btn" :class="yearSort.col === 'c' && 'sort-active'" @click="setSort('yearSort', 'c')">Counts</button></th>
          </tr>
          <tr class="col-labels">
            <th></th>
            <th title="Full concerts">[C]</th>
            <th title="Mini-concerts">[MC]</th>
          </tr>
        </thead>
        <template x-for="y in yearStats" :key="y.year">
          <tr>
            <td x-text="y.year"></td>
            <td x-text="y.c"></td>
            <td x-text="y.mc"></td>
          </tr>
        </template>
      </table>
      </div>

      <h2 class="stats-heading" style="margin-top: 1.5rem">Events by location</h2>
      <div class="stats-table-scroll">
      <table class="stats-table">
        <thead>
          <tr class="sort-row">
            <th><button class="sort-btn" :class="locationSort.col === 'location' && 'sort-active'" @click="setSort('locationSort', 'location')">Location</button></th>
            <th colspan="2"><button class="sort-btn" :class="locationSort.col === 'c' && 'sort-active'" @click="setSort('locationSort', 'c')">Counts</button></th>
          </tr>
          <tr class="col-labels">
            <th></th>
            <th title="Full concerts">[C]</th>
            <th title="Mini-concerts">[MC]</th>
          </tr>
        </thead>
        <template x-for="l in locationStats" :key="l.location">
          <tr>
            <td x-text="l.location"></td>
            <td x-text="l.c"></td>
            <td x-text="l.mc"></td>
          </tr>
        </template>
      </table>
      </div>

      <h2 class="stats-heading" style="margin-top: 1.5rem">Performers</h2>
      <table class="stats-table">
        <thead>
          <tr class="sort-row">
            <th><button class="sort-btn" :class="performerSort.col === 'name' && 'sort-active'" @click="setSort('performerSort', 'name')">Name</button></th>
            <th colspan="2"><button class="sort-btn" :class="performerSort.col === 'c' && 'sort-active'" @click="setSort('performerSort', 'c')">Counts</button></th>
          </tr>
          <tr class="col-labels">
            <th></th>
            <th title="Full concerts">[C]</th>
            <th title="Mini-concerts">[MC]</th>
          </tr>
        </thead>
        <template x-for="p in performerStats" :key="p.name">
          <tr>
            <td x-text="p.name"></td>
            <td x-text="p.c"></td>
            <td x-text="p.mc"></td>
          </tr>
        </template>
      </table>
    </div>
  </main>
</body>
</html>
