<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Events</title>
  <link rel="icon" type="image/svg+xml" href="static/favicon.svg">
  <link rel="icon" type="image/x-icon" href="static/favicon.ico">
  <link rel="stylesheet" href="static/style.css">
  <script src="static/app.js" defer></script>
  <script src="static/vendor/alpine.min.js" defer></script>
</head>
<body x-data="app">
  <header>
    <h1>Events</h1>
    <div class="header-info">
      <span class="header-counts" x-text="counts"></span>
      <span class="header-legend">mini-concert: 5 or fewer songs, under 30 min</span>
    </div>
    <span class="home-link">Generated with <a href="https://github.com/wizzu/eventslist" target="_blank" rel="noopener">eventslist</a></span>
  </header>
  <main>
    <div class="left-col" x-ref="listCol" @scroll="scrolled = $el.scrollTop > 50">
      <p x-show="!events.length" x-text="status"></p>
      <div class="search-wrap">
        <input class="search-box" type="search" placeholder="Search events…" x-model="rawQuery" :class="searching && 'search-pending'" x-ref="search">
        <button class="search-clear" x-show="rawQuery" @click="rawQuery = ''; query = ''; searching = false; clearTimeout(_debounceTimer); $refs.search.focus()" aria-label="Clear search">✕</button>
      </div>
      <div class="listing-toolbar">
        <span class="event-count" @click="if (isMobile) listingOpen = !listingOpen"><span x-html="fmtCountsHtml(filteredEvents) + (query && searchModeLabel ? ' matching' : '') + (filteredEvents.length === 1 ? ' event' : ' events')"></span><span class="search-mode-label" x-show="query && searchModeLabel" x-text="' (' + searchModeLabel + ')'"></span><span class="listing-chevron" x-text="listingOpen ? '▾' : '▸'"></span></span>
        <label class="mini-toggle" x-show="hasMinis" :class="!filteredHasMinis && 'mini-toggle-disabled'"><input type="checkbox" x-model="showMinis" :disabled="!filteredHasMinis"> mini-concerts<span :style="!filteredHasMinis && 'visibility:hidden'" x-text="' (' + (filteredMiniCounts.mc + filteredMiniCounts.miniOnlyC) + ')'"></span></label>
        <button class="sort-toggle" @click="sortAsc = !sortAsc" :title="sortAsc ? 'Sort: oldest first' : 'Sort: newest first'">
          <span x-text="sortAsc ? '↑ Oldest first' : '↓ Newest first'"></span>
        </button>
      </div>
      <div class="event-list" x-show="listingOpen">
        <template x-for="event in filteredEvents" :key="event.id">
          <div class="event-row">
            <span class="event-date" x-text="event.date"></span>
            <span class="event-title">
              <template x-if="event.eventName">
                <span class="event-name-prefix" x-text="event.eventName + ':'"></span>
              </template>
              <template x-for="(p, pi) in event.performers" :key="pi">
                <span class="event-performer" x-show="showMinis || p.type !== 'MC'">
                  <span x-text="p.name" :class="performerMatchesQuery(p.name) && 'performer-match'"></span><span class="performer-detail" x-show="p.detail" x-text="' (' + p.detail + ')'"></span> <span class="mini-badge" x-show="p.type === 'MC'">mini</span>
                </span>
              </template>
            </span>
            <span class="event-location">
              <span x-text="event.location"></span><span class="event-comment" x-show="event.comment" x-text="event.comment ? ' · ' + event.comment : ''"></span>
            </span>
          </div>
        </template>
      </div>
      <button class="scroll-top-btn" x-show="scrolled && listingOpen" x-transition.opacity.duration.300ms @click="$refs.listCol.scrollTo({top: 0, behavior: 'smooth'})" aria-label="Scroll to top">↑ Top</button>
    </div>
    <div class="right-col">
      <dl class="stats-summary">
        <div class="stats-summary-row">
          <dt :class="query && searchMode !== 'performer' && 'stat-active'">Events</dt>
          <dd :class="query && searchMode !== 'performer' && 'stat-active'" x-html="fmtCountsHtml(filteredEvents)"></dd>
        </div>
        <div class="stats-summary-row">
          <dt :class="query && searchMode === 'performer' && 'stat-active'">Performances</dt>
          <dd :class="query && searchMode === 'performer' && 'stat-active'" x-html="fmtCountHtml(performanceCounts.c, performanceCounts.mc)"></dd>
        </div>
        <div class="stats-summary-row">
          <dt>Performers</dt>
          <dd x-html="fmtCountHtml(performerCounts.c, performerCounts.mc)"></dd>
        </div>
        <div class="stats-summary-row">
          <dt>Years</dt>
          <dd x-text="yearStats.length"></dd>
        </div>
      </dl>
      <div class="stats-section" x-data="{ open: true }">
        <h2 class="stats-heading" @click="open = !open">Events by year <span class="stats-chevron" x-text="open ? '▾' : '▸'"></span></h2>
        <div x-show="open">
          <div class="stats-table-scroll">
          <table class="stats-table">
            <thead>
              <tr class="sort-row">
                <th>Year <button class="sort-btn" :class="yearSort.col === 'year' && 'sort-active'" @click.stop="setSort('yearSort', 'year')" x-text="yearSort.col === 'year' ? (yearSort.dir === 'asc' ? '↑' : '↓') : '⇅'"></button></th>
                <th>Count <button class="sort-btn" :class="[yearSort.col === 'c' && 'sort-active', yearSort.col === 'c' && 'sort-locked']" @click.stop="setSort('yearSort', 'c')" x-text="yearSort.col === 'c' ? '●' : '⇅'"></button></th>
              </tr>
            </thead>
            <template x-for="y in yearStats" :key="y.year">
              <tr>
                <td x-text="y.year"></td>
                <td x-html="fmtCountHtml(y.c, y.mc)"></td>
              </tr>
            </template>
          </table>
          </div>
        </div>
      </div>

      <div class="stats-section" x-data="{ open: true }">
        <h2 class="stats-heading" @click="open = !open">Events by location <span class="stats-chevron" x-text="open ? '▾' : '▸'"></span></h2>
        <div x-show="open">
          <div class="stats-table-scroll">
          <table class="stats-table">
            <thead>
              <tr class="sort-row">
                <th>Location <button class="sort-btn" :class="[locationSort.col === 'location' && 'sort-active', locationSort.col === 'location' && 'sort-locked']" @click.stop="setSort('locationSort', 'location')" x-text="locationSort.col === 'location' ? '●' : '⇅'"></button></th>
                <th>Count <button class="sort-btn" :class="[locationSort.col === 'c' && 'sort-active', locationSort.col === 'c' && 'sort-locked']" @click.stop="setSort('locationSort', 'c')" x-text="locationSort.col === 'c' ? '●' : '⇅'"></button></th>
              </tr>
            </thead>
            <template x-for="l in locationStats" :key="l.location">
              <tr>
                <td x-text="l.location"></td>
                <td x-html="fmtCountHtml(l.c, l.mc)"></td>
              </tr>
            </template>
          </table>
          </div>
        </div>
      </div>

      <div class="stats-section" x-data="{ open: true }">
        <h2 class="stats-heading" @click="open = !open">Performers <span class="stats-chevron" x-text="open ? '▾' : '▸'"></span></h2>
        <div x-show="open">
          <table class="stats-table">
            <thead>
              <tr class="sort-row">
                <th>Name <button class="sort-btn" :class="[performerSort.col === 'name' && 'sort-active', performerSort.col === 'name' && 'sort-locked']" @click.stop="setSort('performerSort', 'name')" x-text="performerSort.col === 'name' ? '●' : '⇅'"></button></th>
                <th>Count <button class="sort-btn" :class="[performerSort.col === 'c' && 'sort-active', performerSort.col === 'c' && 'sort-locked']" @click.stop="setSort('performerSort', 'c')" x-text="performerSort.col === 'c' ? '●' : '⇅'"></button></th>
              </tr>
            </thead>
            <template x-for="p in performerStats" :key="p.name">
              <tr>
                <td x-text="p.name"></td>
                <td x-html="fmtCountHtml(p.c, p.mc)"></td>
              </tr>
            </template>
          </table>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
