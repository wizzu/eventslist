<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Events</title>
  <link rel="stylesheet" href="static/style.css">
  <script src="static/app.js" defer></script>
  <script src="static/vendor/alpine-3.15.8.min.js" defer></script>
</head>
<body x-data="app">
  <header>
    <h1>Events</h1>
    <span class="header-counts" x-text="counts"></span>
  </header>
  <main>
    <p x-show="!events.length" x-text="status"></p>
    <div class="search-wrap">
      <input class="search-box" type="search" placeholder="Search events…" x-model="query">
      <button class="search-clear" x-show="query" @click="query = ''" aria-label="Clear search">✕</button>
    </div>
    <div class="event-list">
      <template x-for="(event, index) in filteredEvents" :key="index">
        <div class="event-row">
          <span class="event-date" x-text="event.date"></span>
          <span class="event-title" x-text="eventTitle(event)"></span>
          <span class="event-location" x-text="event.location"></span>
          <span class="event-type" x-show="event.type" x-text="event.type ? '[' + event.type + ']' : ''"></span>
        </div>
      </template>
    </div>
  </main>
</body>
</html>
