<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Events</title>
  <link rel="stylesheet" href="static/style.css">
  <script src="static/app.js" defer></script>
  <script src="static/vendor/alpine-3.15.8.min.js" defer></script>
</head>
<body x-data="app">
  <header>
    <h1>Events</h1>
    <span class="header-counts" x-text="counts"></span>
  </header>
  <main>
    <div class="left-col">
      <p x-show="!events.length" x-text="status"></p>
      <div class="search-wrap">
        <input class="search-box" type="search" placeholder="Search events…" x-model="query">
        <button class="search-clear" x-show="query" @click="query = ''" aria-label="Clear search">✕</button>
      </div>
      <div class="event-list">
        <template x-for="(event, index) in filteredEvents" :key="index">
          <div class="event-row">
            <span class="event-date" x-text="event.date"></span>
            <span class="event-title" x-text="eventTitle(event)"></span>
            <span class="event-location" x-text="event.location"></span>
            <span class="event-type" x-show="event.type" x-text="event.type ? '[' + event.type + ']' : ''"></span>
          </div>
        </template>
      </div>
    </div>
    <div class="right-col">
      <h2 class="stats-heading">By year</h2>
      <div class="stats-table-scroll">
      <table class="stats-table">
        <thead>
          <tr>
            <th>Year</th>
            <th title="Full concerts">[C]</th>
            <th title="Mini-concerts">[MC]</th>
          </tr>
        </thead>
        <template x-for="y in yearStats" :key="y.year">
          <tr>
            <td x-text="y.year"></td>
            <td x-text="y.c"></td>
            <td x-text="y.mc"></td>
          </tr>
        </template>
      </table>
      </div>

      <h2 class="stats-heading" style="margin-top: 1.5rem">By location</h2>
      <div class="stats-table-scroll">
      <table class="stats-table">
        <thead>
          <tr>
            <th>Location</th>
            <th title="Full concerts">[C]</th>
            <th title="Mini-concerts">[MC]</th>
          </tr>
        </thead>
        <template x-for="l in locationStats" :key="l.location">
          <tr>
            <td x-text="l.location"></td>
            <td x-text="l.c"></td>
            <td x-text="l.mc"></td>
          </tr>
        </template>
      </table>
      </div>

      <h2 class="stats-heading" style="margin-top: 1.5rem">Performers</h2>
      <table class="stats-table">
        <thead>
          <tr>
            <th>Name</th>
            <th title="Full concerts">[C]</th>
            <th title="Mini-concerts">[MC]</th>
          </tr>
        </thead>
        <template x-for="p in performerStats" :key="p.name">
          <tr>
            <td x-text="p.name"></td>
            <td x-text="p.c"></td>
            <td x-text="p.mc"></td>
          </tr>
        </template>
      </table>
    </div>
  </main>
</body>
</html>
