<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Events</title>
  <link rel="icon" type="image/svg+xml" href="static/favicon.svg">
  <link rel="icon" type="image/x-icon" href="static/favicon.ico">
  <script>
    /* Version string displayed in the header. Increment on each deploy: v1, v2, v3, ... */
    window.__appVersion = 'v10';
  </script>
  <link rel="stylesheet" href="static/style.css">
  <script src="static/strings.js" defer></script>
  <script src="static/app.js" defer></script>
  <script src="static/vendor/alpine.min.js" defer></script>
</head>
<body x-data="app">
  <header>
    <h1 x-text="t.pageTitle"></h1>
    <div class="header-info">
      <span class="header-counts" x-text="counts"></span>
      <span class="header-legend" x-text="t.miniDef"></span>
    </div>
    <div class="header-end">
      <div class="lang-switcher">
        <button @click="lang = 'en'" :class="lang === 'en' && 'lang-active'">EN</button>
        <button @click="lang = 'fi'" :class="lang === 'fi' && 'lang-active'">FI</button>
      </div>
      <span class="home-link"><span class="home-link-text">Generated with <a href="https://github.com/wizzu/eventslist" target="_blank" rel="noopener">eventslist</a> · </span><span x-show="version" x-text="version"></span></span>
    </div>
  </header>
  <main>
    <div class="left-col" x-ref="listCol" @scroll="scrolled = $el.scrollTop > 50">
      <p x-show="!events.length" x-text="status"></p>
      <div class="search-wrap">
        <input class="search-box" type="search" :placeholder="t.searchPlaceholder" x-model="rawQuery" :class="searching && 'search-pending'" x-ref="search">
        <button class="search-clear" x-show="rawQuery" @click="rawQuery = ''; query = ''; searching = false; clearTimeout(_debounceTimer); $refs.search.focus()" :aria-label="t.searchClearLabel">✕</button>
      </div>
      <!-- Mobile duplicate of stats-summary-desktop in .right-col — keep both in sync. -->
      <dl class="stats-summary stats-summary-mobile">
        <div class="stats-summary-row">
          <dt :class="query && searchMode !== 'performer' && 'stat-active'" x-text="t.statEvents"></dt>
          <dd :class="query && searchMode !== 'performer' && 'stat-active'" x-html="fmtCountsHtml(filteredEvents)"></dd>
        </div>
        <div class="stats-summary-row">
          <dt :class="query && searchMode === 'performer' && 'stat-active'" x-text="t.statPerformances"></dt>
          <dd :class="query && searchMode === 'performer' && 'stat-active'" x-html="fmtCountHtml(performanceCounts.c, performanceCounts.mc)"></dd>
        </div>
        <div class="stats-summary-row">
          <dt x-text="t.statPerformers"></dt>
          <dd x-html="fmtCountHtml(performerCounts.c, performerCounts.mc)"></dd>
        </div>
        <div class="stats-summary-row">
          <dt x-text="t.statYears"></dt>
          <dd x-text="yearStats.length"></dd>
        </div>
      </dl>
      <div class="listing-toolbar">
        <span class="event-count" :class="query && 'search-active'" @click="if (isMobile) listingOpen = !listingOpen"><span x-html="fmtCountsHtml(filteredEvents) + (query && searchModeLabel ? t.matchingLabel : '') + t.eventLabel(filteredEvents.length)"></span><span class="search-mode-label" x-show="query && searchModeLabel" x-text="' (' + t.searchModePrefix + searchModeLabel + ')'"></span><span class="listing-chevron" x-text="listingOpen ? '▾' : '▸'"></span></span>
        <label class="mini-toggle" x-show="hasMinis" :class="!filteredHasMinis && 'mini-toggle-disabled'"><input type="checkbox" x-model="showMinis" :disabled="!filteredHasMinis"> <span x-text="t.miniToggle"></span><span :style="!filteredHasMinis && 'visibility:hidden'" x-text="' (' + (filteredMiniCounts.mc + filteredMiniCounts.miniOnlyC) + ')'"></span></label>
        <button class="sort-toggle" @click="sortAsc = !sortAsc" :title="sortAsc ? t.sortOldestTitle : t.sortNewestTitle">
          <span x-text="sortAsc ? t.sortOldestLabel : t.sortNewestLabel"></span>
        </button>
      </div>
      <p class="collapsed-hint" x-show="!listingOpen" x-text="t.hiddenHint(filteredEvents.length)"></p>
      <div class="event-list" x-show="listingOpen">
        <template x-for="event in filteredEvents" :key="event.id">
          <div class="event-row">
            <span class="event-date" x-text="event.date"></span>
            <span class="event-title">
              <template x-if="event.eventName">
                <span class="event-name-prefix" x-text="event.eventName + ':'"></span>
              </template>
              <template x-for="(p, pi) in displayPerformers(event)" :key="pi">
                <span class="event-performer" x-show="showMinis || p.type !== 'MC'">
                  <span x-text="p.name" :class="performerMatchesQuery(p.name) && 'performer-match'"></span><span class="performer-detail" x-show="p.detail" x-text="' (' + p.detail + ')'"></span> <span class="mini-badge" x-show="p.type === 'MC'">mini</span>
                </span>
              </template>
            </span>
            <span class="event-venue">
              <span class="venue-main" x-text="venueMain(event.venue)"></span><span class="venue-rest" x-show="venueRest(event.venue)" x-text="venueRest(event.venue)"></span><span class="event-comment" x-show="event.comment" x-text="event.comment ? ' · ' + event.comment : ''"></span>
            </span>
          </div>
        </template>
      </div>
      <button class="scroll-top-btn" x-show="scrolled && listingOpen" x-transition.opacity.duration.300ms @click="$refs.listCol.scrollTo({top: 0, behavior: 'smooth'})" :aria-label="t.scrollTopLabel" x-text="t.scrollTopText"></button>
    </div>
    <div class="right-col">
      <!-- Desktop copy of stats-summary-mobile in .left-col — keep both in sync. -->
      <dl class="stats-summary stats-summary-desktop">
        <div class="stats-summary-row">
          <dt :class="query && searchMode !== 'performer' && 'stat-active'" x-text="t.statEvents"></dt>
          <dd :class="query && searchMode !== 'performer' && 'stat-active'" x-html="fmtCountsHtml(filteredEvents)"></dd>
        </div>
        <div class="stats-summary-row">
          <dt :class="query && searchMode === 'performer' && 'stat-active'" x-text="t.statPerformances"></dt>
          <dd :class="query && searchMode === 'performer' && 'stat-active'" x-html="fmtCountHtml(performanceCounts.c, performanceCounts.mc)"></dd>
        </div>
        <div class="stats-summary-row">
          <dt x-text="t.statPerformers"></dt>
          <dd x-html="fmtCountHtml(performerCounts.c, performerCounts.mc)"></dd>
        </div>
        <div class="stats-summary-row">
          <dt x-text="t.statYears"></dt>
          <dd x-text="yearStats.length"></dd>
        </div>
      </dl>
      <div class="stats-sections">
      <div class="stats-section" x-data="{ open: true }">
        <h2 class="stats-heading" @click="open = !open"><span x-text="t.sectionByYear"></span> <span class="stats-chevron" x-text="open ? '▾' : '▸'"></span></h2>
        <p class="collapsed-hint" x-show="!open" x-text="t.hiddenHint(yearStats.length)"></p>
        <div x-show="open">
          <div class="stats-table-scroll">
          <table class="stats-table">
            <thead>
              <tr class="sort-row">
                <th><span x-text="t.colYear"></span> <button class="sort-btn" :class="yearSort.col === 'year' && 'sort-active'" @click.stop="setSort('yearSort', 'year')" x-text="yearSort.col === 'year' ? (yearSort.dir === 'asc' ? '↑' : '↓') : '⇅'"></button></th>
                <th><span x-text="t.colCount"></span> <button class="sort-btn" :class="[yearSort.col === 'c' && 'sort-active', yearSort.col === 'c' && 'sort-locked']" @click.stop="setSort('yearSort', 'c')" x-text="yearSort.col === 'c' ? '●' : '⇅'"></button></th>
              </tr>
            </thead>
            <template x-for="y in yearStats" :key="y.year">
              <tr>
                <td x-text="y.year"></td>
                <td x-html="fmtCountHtml(y.c, y.mc)"></td>
              </tr>
            </template>
          </table>
          </div>
        </div>
      </div>

      <div class="stats-section" x-data="{ open: true }">
        <h2 class="stats-heading" @click="open = !open"><span x-text="t.sectionByVenue"></span> <span class="stats-chevron" x-text="open ? '▾' : '▸'"></span></h2>
        <p class="collapsed-hint" x-show="!open" x-text="t.hiddenHint(venueStats.length)"></p>
        <div x-show="open">
          <div class="stats-table-scroll">
          <table class="stats-table">
            <thead>
              <tr class="sort-row">
                <th><span x-text="t.colVenue"></span> <button class="sort-btn" :class="[venueSort.col === 'venue' && 'sort-active', venueSort.col === 'venue' && 'sort-locked']" @click.stop="setSort('venueSort', 'venue')" x-text="venueSort.col === 'venue' ? '●' : '⇅'"></button></th>
                <th><span x-text="t.colCount"></span> <button class="sort-btn" :class="[venueSort.col === 'c' && 'sort-active', venueSort.col === 'c' && 'sort-locked']" @click.stop="setSort('venueSort', 'c')" x-text="venueSort.col === 'c' ? '●' : '⇅'"></button></th>
              </tr>
            </thead>
            <template x-for="l in venueStats" :key="l.venue">
              <tr>
                <td x-text="l.venue"></td>
                <td x-html="fmtCountHtml(l.c, l.mc)"></td>
              </tr>
            </template>
          </table>
          </div>
        </div>
      </div>

      <div class="stats-section" x-data="{ open: true }">
        <h2 class="stats-heading" @click="open = !open"><span x-text="t.sectionPerformers"></span> <span class="stats-chevron" x-text="open ? '▾' : '▸'"></span></h2>
        <p class="collapsed-hint" x-show="!open" x-text="t.hiddenHint(performerStats.length)"></p>
        <div x-show="open">
          <table class="stats-table">
            <thead>
              <tr class="sort-row">
                <th><span x-text="t.colName"></span> <button class="sort-btn" :class="[performerSort.col === 'name' && 'sort-active', performerSort.col === 'name' && 'sort-locked']" @click.stop="setSort('performerSort', 'name')" x-text="performerSort.col === 'name' ? '●' : '⇅'"></button></th>
                <th><span x-text="t.colCount"></span> <button class="sort-btn" :class="[performerSort.col === 'c' && 'sort-active', performerSort.col === 'c' && 'sort-locked']" @click.stop="setSort('performerSort', 'c')" x-text="performerSort.col === 'c' ? '●' : '⇅'"></button></th>
              </tr>
            </thead>
            <template x-for="p in performerStats" :key="p.name">
              <tr>
                <td x-text="p.name"></td>
                <td x-html="fmtCountHtml(p.c, p.mc)"></td>
              </tr>
            </template>
          </table>
        </div>
      </div>
      </div><!-- .stats-sections -->
    </div>
  </main>
  <footer class="site-footer">Generated with <a href="https://github.com/wizzu/eventslist" target="_blank" rel="noopener">eventslist</a><span x-show="version" x-text="' · ' + version"></span></footer>
</body>
</html>
